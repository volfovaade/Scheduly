version: "3.9"
services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules  # exclude node_modules from sync
    environment:
      - CHOKIDAR_USEPOLLING=true  # for file watching in Docker
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile.dev 
    env_file:
      - .env
      - backend/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - HTTP_PORTS=80
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    ports:
      - "${BACKEND_PORT:-8081}:80"
    volumes:
      - .:/app
      - /app/backend/bin
      - /app/backend/obj
      - /app/backend.Tests/bin
      - /app/backend.Tests/obj
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"

volumes:
  db-data: