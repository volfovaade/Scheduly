
version: "3.9"
services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - REACT_APP_API_BASE_URL=${BACKEND_URL}/api
      - NODE_ENV=production
    depends_on:
      - backend
  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=80
    env_file:
      - .env
      - backend/.env
    ports:
      - "${BACKEND_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data: